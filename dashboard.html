<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - StudyNest</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .container { width: 80%; margin: auto; padding: 20px; }
        .grid-materias { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .btn-logout { background: #e74c3c; width: auto; padding: 5px 15px; float: right; }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        <h1>Bienvenido, <span id="nombreUsuario">Estudiante</span>! 👋</h1>
        <p>Este es tu nido de estudio. Aquí verás tus materias.</p>
        
        <hr>
        
        <h3>Mis Materias</h3>
        <div id="listaMaterias" class="grid-materias">
            <div class="card">
                <h4>Todavía no tienes materias</h4>
                <button style="font-size: 12px;">+ Unirse a una clase</button>
            </div>
        </div>
    </div>

    <script>
        // Leer el nombre que guardamos en el login
        const nombre = localStorage.getItem('usuarioNombre');
        if (!nombre) {
            window.location.href = "login.html"; // Si no está logueado, lo echa
        } else {
            document.getElementById('nombreUsuario').innerText = nombre;
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
