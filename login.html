<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - StudyNest</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="box">
        <h1>Entrar a StudyNest</h1>
        <p>Tu nido de estudio te espera</p>
        <div class="form-group">
            <input type="email" id="emailLogin" placeholder="Correo universitario">
            <input type="password" id="passwordLogin" placeholder="Tu contraseña">
        </div>
        <button onclick="iniciarSesion()">Ingresar</button>
        <div id="respuestaLogin"></div>
    </div>
    <script src="./js/app.js"></script>
</body>
</html>
