<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StudyNest - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-wrapper">
    <div class="box"> <h1>StudyNest</h1>
        <p>Tu nido de estudio te espera</p>
        
        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" id="emailLogin" placeholder="tu@correo.com" required>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="passwordLogin" placeholder="••••" required>
        </div>
        <button type="button" onclick="iniciarSesion()" class="btn-primary">Ingresar</button>
        
        <div id="respuestaLogin" style="margin-top: 15px; font-weight: bold;"></div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
