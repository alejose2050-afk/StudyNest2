<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Prueba de Conexión StudyNest</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #eef2f3;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        input {
            padding: 12px;
            width: 200px;
            border: 2px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 12px 25px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #27ae60;
        }

        #respuesta {
            margin-top: 20px;
            font-weight: bold;
            color: #34495e;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>StudyNest Demo</h1>
        <input type="text" id="nombreInput" placeholder="Escribe tu nombre">
        <button onclick="enviarDatos()">Probar Conexión</button>
        <div id="respuesta"> Esperando envío... </div>
    </div>

    <script>
        async function enviarDatos() {
            const nombre = document.getElementById('nombreInput').value;
            const cajaRespuesta = document.getElementById('respuesta');

            if (!nombre) return alert("Escribe un nombre");

            cajaRespuesta.innerText = "Conectando...";

            try {
                // Conectamos a la IP local y puerto 5000
                const response = await fetch('http://127.0.0.1:5000/api/nombre', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: nombre })
                });

                const data = await response.json();

                // Mostramos el éxito
                cajaRespuesta.innerHTML = `<span style="color: green;">✅ ${data.mensaje} <br> Hola, ${data.tuNombre}!</span>`;
                console.log("Respuesta del servidor:", data);

            } catch (error) {
                console.error("Error:", error);
                cajaRespuesta.innerHTML = `<span style="color: red;">❌ Error: ¿Encendiste el servidor?</span>`;
            }
        }
    </script>
</body>

</html>
